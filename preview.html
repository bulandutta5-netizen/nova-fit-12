                  <Dashboard AvatarDisplay={AvatarDisplay} user={user} userProfile={profile} setProfile={setProfile} setActiveTab={setActiveTab} waterCups={waterCups} setWaterCups={setWaterCups} sleepHrs={sleepHrs} setSleepHrs={setSleepHrs} soreness={soreness} setSoreness={setSoreness} energy={energy} setEnergy={setEnergy} />
                </div>

                <div className={activeTab === 'coach' ? "animate-bubble-appear" : "hidden"}>
                  <Chatbot mode="full" user={user} userProfile={profile} />
                </div>

                <div className={activeTab === 'workouts' ? "animate-bubble-appear" : "hidden"}>
                  <WorkoutGenerator />
                </div>

                <div className={activeTab === 'nutrition' ? "flex flex-col gap-8 animate-bubble-appear" : "hidden"}>
                  <Calculator onCalculate={setProfile} />
                  <DietPlanner userProfile={profile} />
                </div>

                <div className={activeTab === 'progress' ? "flex flex-col gap-6 animate-bubble-appear" : "hidden"}>
                  {/* Render existing habits dashboard visualizers */}
                  <div className="glass-panel p-6 rounded-3xl glow-border card-radial-blue min-h-[300px] flex flex-col justify-between">
                    <div className="flex justify-between items-center mb-6">
                      <div>
                        <h4 className="text-base font-bold font-outfit text-white">Metabolic Energy Balance</h4>
                        <p className="text-xs text-gray-500 mt-0.5">Calories Burned vs Calories Consumed</p>
                      </div>
                    </div>
                    <div className="w-full flex-1 flex items-end justify-between px-4 pb-4 h-48 border-b border-[#1F1F46]/50 relative">
                      <div className="absolute inset-0 flex flex-col justify-between pointer-events-none opacity-20 py-2">
                        <div className="h-px bg-white" />
                        <div className="h-px bg-white" />
                        <div className="h-px bg-white" />
                      </div>
                      {[
                        { day: 'Mon', in: 1950, out: 450 },
                        { day: 'Tue', in: 2100, out: 620 },
                        { day: 'Wed', in: 1850, out: 350 },
                        { day: 'Thu', in: 2300, out: 710 },
                        { day: 'Fri', in: 2050, out: 580 },
                        { day: 'Sat', in: 2400, out: 820 },
                        { day: 'Sun', in: 1900, out: 500 }
                      ].map((d, index) => {
                        const inHeight = (d.in / 2500) * 100;
                        const outHeight = (d.out / 2500) * 100 * 2.2;
                        return (
                          <div key={index} className="flex flex-col items-center gap-2 z-10 w-full">
                            <div className="flex gap-1.5 items-end justify-center h-32 w-full">
                              <div className="w-3 sm:w-4 bg-gradient-to-t from-blue-900 to-[#00D2FF] rounded-t-sm" style={{ height: `${outHeight}%` }} />
                              <div className="w-3 sm:w-4 bg-gradient-to-t from-purple-900 to-[#9D00FF] rounded-t-sm" style={{ height: `${inHeight}%` }} />
                            </div>
                            <span className="text-[10px] text-gray-500 font-bold">{d.day}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                  
                  {/* Water log loggers */}
                  <div className="glass-panel p-6 rounded-3xl glow-border card-radial-purple flex flex-col justify-between max-w-md mx-auto w-full">
                    <div className="flex items-center gap-2 justify-center mb-6 select-none">
                      <div className="p-2 bg-blue-500/15 text-blue-500 rounded-xl"><i className="lucide-droplet w-4 h-4 fill-blue-500/10"></i></div>
                      <h4 className="text-sm font-bold font-outfit text-white">Daily Water Habit Logger</h4>
                    </div>
                    <div className="text-center my-6">
                      <span className="text-4xl font-extrabold font-outfit text-white">{(waterCups * 0.25).toFixed(2)}</span>
                      <span className="text-[10px] text-gray-400 font-semibold block mt-1 uppercase tracking-wider">Liters logged / 3.5L goal</span>
                    </div>
                    <div className="flex justify-center gap-1.5 flex-wrap max-w-[200px] mx-auto mb-6">
                      {Array.from({ length: 14 }).map((_, i) => (
                        <div key={i} className={`w-3 h-5 rounded-sm border transition-all duration-300 ${
                          i < waterCups ? 'bg-[#00D2FF] border-[#00D2FF] shadow-[0_0_8px_rgba(0,210,255,0.4)]' : 'border-[#1F1F46]/70 bg-transparent'
                        }`} />
                      ))}
                    </div>
                    <div className="flex gap-4 w-full justify-center mt-2">
                      <button onClick={() => setWaterCups(Math.max(0, waterCups - 1))} className="p-3.5 rounded-2xl bg-white/5 border border-[#1F1F46]/50 hover:bg-white/10 text-gray-400 cursor-pointer transition-all"><i className="lucide-minus w-4 h-4"></i></button>
                      <button onClick={() => setWaterCups(Math.min(18, waterCups + 1))} className="flex-1 flex items-center justify-center gap-2 py-3.5 px-6 rounded-2xl bg-gradient-to-r from-[#00D2FF] to-[#9D00FF] font-bold text-xs text-white cursor-pointer active:scale-[0.99] transition-all"><i className="lucide-plus w-3.5 h-3.5"></i> Log Cup</button>
                    </div>
                  </div>
                </div>

                <div className={activeTab === 'recovery' ? "flex flex-col gap-6 max-w-xl mx-auto animate-bubble-appear" : "hidden"}>
                  <div className="glass-panel p-6 rounded-3xl glow-border card-radial-purple flex flex-col justify-between">
                    <div className="flex items-center gap-2 mb-4 pb-4 border-b border-[#1F1F46]/50">
                      <div className="p-2.5 bg-[#00F0FF]/10 text-[#00F0FF] rounded-xl shrink-0"><i className="lucide-activity w-5 h-5"></i></div>
                      <h4 className="text-base font-bold font-outfit text-white">Interactive Recovery Hub</h4>
                    </div>
                    <p className="text-xs text-gray-400 mb-6 leading-relaxed">
                      Log your daily vitals below to dynamically adjust your physical load and target thresholds. Coach Nova will adjust your workout weights and rest tones based on these bio-metrics.
                    </p>

                    <div className="mb-4">
                      <div className="flex justify-between items-center text-xs text-gray-400 font-bold font-outfit mb-2 uppercase">
                        <span>1. Sleep Quality</span>
                        <span className="text-white">{sleepHrs} Hours</span>
                      </div>
                      <input 
                        type="range" min="4" max="10" step="1" 
                        value={sleepHrs} 
                        onChange={(e) => { setSleepHrs(parseInt(e.target.value)); }}
                        className="w-full accent-[#00F0FF] cursor-pointer bg-white/5 rounded-lg appearance-none h-1"
                      />
                    </div>

                    <div className="mb-4">
                      <span className="block text-xs text-gray-400 font-bold font-outfit mb-2 uppercase select-none">2. Muscle Soreness</span>
                      <div className="grid grid-cols-3 gap-2">
                        {['Mild', 'Moderate', 'Severe'].map(lvl => (
                          <button 
                            key={lvl} 
                            onClick={() => { setSoreness(lvl); }}
                            className={`py-2 rounded-xl text-[10px] font-bold transition-all border outline-none cursor-pointer ${
                              soreness === lvl 
                                ? 'border-[#00D2FF]/40 bg-[#00D2FF]/10 text-white shadow-[0_0_10px_rgba(0,210,255,0.12)]' 
                                : 'border-[#1F1F46]/50 bg-white/3 text-gray-400 hover:text-white'
                            }`}
                          >
                            {lvl === 'Mild' ? '🟢 Mild' : lvl === 'Moderate' ? '🟡 Medium' : '🔴 Severe'}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div className="mb-6">
                      <div className="flex justify-between items-center text-xs text-gray-400 font-bold font-outfit mb-2 uppercase">
                        <span>3. Energy Levels</span>
                        <span className="text-white">{energy} / 10</span>
                      </div>
                      <input 
                        type="range" min="3" max="10" step="1" 
                        value={energy} 
                        onChange={(e) => { setEnergy(parseInt(e.target.value)); }}
                        className="w-full accent-[#9D00FF] cursor-pointer bg-white/5 rounded-lg appearance-none h-1"
                      />
                    </div>

                    <div className="flex items-center justify-between p-4 rounded-xl bg-black/40 border border-[#1F1F46]/50 text-left select-none">
                      <div>
                        <span className="text-[9px] text-gray-500 font-bold block uppercase tracking-wider">Dynamic Recovery Score</span>
                        <span className={`text-xl font-black font-outfit ${recoveryColor} mt-0.5 block`}>{recoveryScore}%</span>
                      </div>
                      <div className={`px-2.5 py-1.5 rounded-lg text-[9px] font-bold ${recoveryColor} ${recoveryBg} tracking-wider font-outfit uppercase`}>
                        {recoveryAdvice}
                      </div>
                    </div>
                  </div>
                </div>

                <div className={activeTab === 'pricing' ? "animate-bubble-appear" : "hidden"}>
                  <Pricing />
                </div>

                <div className={activeTab === 'calendar' ? "animate-bubble-appear" : "hidden"}>
                  <WorkoutCalendar profile={profile} />
                </div>

                <div className={activeTab === 'settings' ? "animate-bubble-appear" : "hidden"}>
                  {/* ── PROFILE PAGE ─────────────────────────────────────── */}
                  <div className="max-w-2xl mx-auto flex flex-col gap-5">

                    {/* Header */}
                    <div className="flex items-center gap-2 mb-1">
                      <i className="lucide-user-circle w-5 h-5 text-[#00D2FF]"></i>
                      <h2 className="text-base font-black font-outfit text-white tracking-wide">My Profile</h2>
                    </div>

                    {/* Avatar + Identity Card */}
                    <div className="glass-panel p-6 rounded-3xl glow-border card-radial-blue border-[#1F1F46]/50 flex items-center gap-5 relative overflow-hidden">
                      <div className="absolute inset-0 bg-gradient-to-r from-[#00D2FF]/5 to-transparent pointer-events-none" />
                      {/* Current Avatar Display */}
                      <div className="relative shrink-0 z-10">
                        <AvatarDisplay size="lg" />
                        <span className="absolute -bottom-1 -right-1 w-5 h-5 bg-[#00F0FF] rounded-full border-2 border-[#0B0B0E] shadow-[0_0_8px_#00F0FF]" />
                      </div>
                      {/* Name + Email */}
                      <div className="z-10 flex-1 min-w-0">
                        <h3 className="text-xl font-black font-outfit text-white truncate">{user ? user.name : '—'}</h3>
                        <p className="text-xs text-gray-400 mt-0.5 truncate">{user ? user.email : '—'}</p>
                      </div>
                      {/* Log Out */}
                      <button
                        onClick={handleLogout}
                        className="z-10 shrink-0 flex items-center gap-1.5 px-3 py-2 rounded-xl border border-red-500/20 bg-red-500/5 text-xs font-bold text-red-400 hover:bg-red-500/10 transition-all cursor-pointer"
                      >
                        <i className="lucide-log-out w-3.5 h-3.5"></i>
                        <span className="hidden sm:inline">Log Out</span>
                      </button>
                    </div>

                    {/* ── AVATAR PICKER CARD ─────────────────────────── */}
                    <div className="glass-panel p-5 rounded-3xl glow-border border-[#1F1F46]/50">
                      <div className="flex items-center gap-2 mb-4 pb-3 border-b border-[#1F1F46]/50">
                        <i className="lucide-image w-4 h-4 text-[#00D2FF]"></i>
                        <span className="text-xs font-black font-outfit text-white uppercase tracking-wider">Profile Picture</span>
                      </div>

                      {/* Upload real photo */}
                      <div className="mb-4">
                        <p className="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-2">Upload Your Photo</p>
                        <label className="flex items-center gap-3 p-3 rounded-xl border border-dashed border-[#1F1F46]/70 hover:border-[#00D2FF]/40 hover:bg-[#00D2FF]/5 transition-all cursor-pointer group">
                          <div className="w-9 h-9 rounded-xl bg-[#00D2FF]/10 border border-[#00D2FF]/20 flex items-center justify-center shrink-0 group-hover:bg-[#00D2FF]/20 transition-all">
                            <i className="lucide-upload w-4 h-4 text-[#00D2FF]"></i>
                          </div>
                          <div className="flex-1 min-w-0">
                            <span className="text-xs font-bold text-white block">Choose image file</span>
                            <span className="text-[10px] text-gray-500">JPG, PNG, WEBP — max 2MB</span>
                          </div>
                          <input
                            type="file"
                            accept="image/*"
                            className="hidden"
                            onChange={(e) => {
                              const file = e.target.files[0];
                              if (!file) return;
                              if (file.size > 2 * 1024 * 1024) { alert('Image too large. Max 2MB.'); return; }
                              const reader = new FileReader();
                              reader.onload = (ev) => {
                                const dataUrl = ev.target.result;
                                setAvatarURL(dataUrl);
                                localStorage.setItem('novafit_avatar', dataUrl);
                              };
                              reader.readAsDataURL(file);
                            }}
                          />
                        </label>
                      </div>

                      {/* AI Avatar grid — Male & Female illustrated avatars */}
                      <div>
                        <div className="flex items-center gap-3 mb-3">
                          <p className="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Choose an AI Avatar</p>
                          <div className="flex items-center gap-2 text-[9px] font-bold">
                            <span className="flex items-center gap-1 text-[#00D2FF]"><span className="w-3 h-3 rounded-full bg-[#00D2FF]/20 border border-[#00D2FF]/40 inline-flex items-center justify-center text-[8px]">♂</span> Male</span>
                            <span className="flex items-center gap-1 text-pink-400"><span className="w-3 h-3 rounded-full bg-pink-500/20 border border-pink-500/30 inline-flex items-center justify-center text-[8px]">♀</span> Female</span>
                          </div>
                        </div>
                        <div className="grid grid-cols-4 sm:grid-cols-6 gap-3">
                          {Object.entries(AI_AVATARS).map(([id, av]) => {
                            const marker = `__ai_${id}`;
                            const isSelected = avatarURL === marker;
                            const isFemale = av.tag === '♀';
                            return (
                              <button
                                key={id}
                                onClick={() => { setAvatarURL(marker); localStorage.setItem('novafit_avatar', marker); }}
                                className={`relative flex flex-col items-center gap-1.5 p-1.5 rounded-2xl border-2 transition-all cursor-pointer group ${
                                  isSelected
                                    ? 'border-[#00D2FF] shadow-[0_0_16px_rgba(0,210,255,0.35)] bg-[#00D2FF]/5'
                                    : 'border-[#1F1F46]/50 hover:border-white/20 hover:bg-white/3'
                                }`}
                                title={`${av.label} — ${av.tag === '♂' ? 'Male' : 'Female'}`}
                              >
                                {/* Avatar image */}
                                <div className="relative w-full aspect-square rounded-xl overflow-hidden" style={{ backgroundColor: av.color }}>
                                  <img
                                    src={av.url}
                                    alt={av.label}
                                    className="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105"
                                    loading="lazy"
                                  />
                                  {/* Gender badge */}
                                  <span className={`absolute top-1 left-1 w-4 h-4 rounded-full text-[9px] font-black flex items-center justify-center ${
                                    isFemale ? 'bg-pink-500/80 text-white' : 'bg-[#00D2FF]/80 text-black'
                                  }`}>{av.tag}</span>
                                  {/* Selected checkmark */}
                                  {isSelected && (
                                    <span className="absolute top-1 right-1 w-4 h-4 bg-[#00D2FF] rounded-full flex items-center justify-center text-[8px] text-black font-black shadow-[0_0_6px_#00D2FF]">✓</span>
                                  )}
                                </div>
                                {/* Name label */}
                                <span className={`text-[9px] font-bold leading-none ${
                                  isSelected ? 'text-[#00D2FF]' : 'text-gray-500 group-hover:text-white'
                                } transition-colors`}>{av.label}</span>
                              </button>
                            );
                          })}
                        </div>
                      </div>

                      {/* Remove / Reset */}
                      {avatarURL && (
                        <button
                          onClick={() => { setAvatarURL(null); localStorage.removeItem('novafit_avatar'); }}
                          className="mt-3 w-full py-2 rounded-xl border border-[#1F1F46]/50 text-[10px] font-bold text-gray-500 hover:text-white hover:border-white/15 transition-all cursor-pointer"
                        >
                          ✕ Remove custom avatar
                        </button>
                      )}
                    </div>

                    {/* Fitness Goal + Calorie Banner */}
                    <div className="grid grid-cols-2 gap-4">
                      <div className="glass-panel p-4 rounded-2xl glow-border border-[#1F1F46]/50 flex flex-col gap-1">
                        <span className="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Fitness Goal</span>
                        <span className="text-sm font-black font-outfit text-white capitalize mt-0.5">
                          {user && user.goal ? user.goal : (profile.goal === 'bulk' ? 'Muscle Gain' : profile.goal === 'shred' ? 'Fat Loss' : 'Maintenance')}
                        </span>
                        <span className="text-[9px] text-[#00D2FF] font-bold mt-0.5">
                          {profile.goal === 'bulk' ? 'Caloric Surplus' : profile.goal === 'shred' ? 'Caloric Deficit' : 'Body Recomp'}
                        </span>
                      </div>
                      <div className="glass-panel p-4 rounded-2xl glow-border card-radial-blue border-[#1F1F46]/50 flex flex-col gap-1">
                        <span className="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Daily Calorie Target</span>
                        <span className="text-xl font-black font-outfit text-[#00D2FF]">{user && user.targetCalories ? user.targetCalories : profile.targetCalories} <span className="text-xs text-gray-400 font-bold">kcal</span></span>
                        <span className="text-[9px] text-gray-500 font-bold">Protein: {user && user.targetProtein ? user.targetProtein : Math.round((user && user.weight ? parseFloat(user.weight) : 72) * 1.8)}g/day</span>
                      </div>
                    </div>

                    {/* Physical Stats */}
                    <div className="glass-panel p-5 rounded-3xl glow-border border-[#1F1F46]/50">
                      <div className="flex items-center gap-2 mb-4 pb-3 border-b border-[#1F1F46]/50">
                        <i className="lucide-activity w-4 h-4 text-[#9D00FF]"></i>
                        <span className="text-xs font-black font-outfit text-white uppercase tracking-wider">Physical Stats</span>
                      </div>
                      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        {[
                          { label: 'Weight', value: user && user.weight ? `${user.weight} kg` : `${profile.weight} kg`, icon: 'lucide-weight', color: 'text-[#00D2FF]' },
                          { label: 'Height', value: user && user.height ? `${user.height} cm` : `${profile.height} cm`, icon: 'lucide-ruler', color: 'text-[#9D00FF]' },
                          { label: 'Age', value: user && user.age ? `${user.age} yrs` : `${profile.age} yrs`, icon: 'lucide-calendar', color: 'text-[#00F0FF]' },
                          { label: 'BMI', value: profile.bmi || (user && user.weight && user.height ? (parseFloat(user.weight) / Math.pow(parseFloat(user.height)/100, 2)).toFixed(1) : '22.4'), icon: 'lucide-heart-pulse', color: 'text-green-400' },
                        ].map(stat => (
                          <div key={stat.label} className="p-3 rounded-xl bg-black/30 border border-[#1F1F46]/50 flex flex-col gap-1">
                            <i className={`${stat.icon} w-3.5 h-3.5 ${stat.color}`}></i>
                            <span className={`text-sm font-black font-outfit ${stat.color}`}>{stat.value}</span>
                            <span className="text-[9px] text-gray-500 font-bold uppercase tracking-wider">{stat.label}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Training Profile */}
                    <div className="glass-panel p-5 rounded-3xl glow-border border-[#1F1F46]/50">
                      <div className="flex items-center gap-2 mb-4 pb-3 border-b border-[#1F1F46]/50">
                        <i className="lucide-dumbbell w-4 h-4 text-[#00D2FF]"></i>
                        <span className="text-xs font-black font-outfit text-white uppercase tracking-wider">Training Profile</span>
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        {[
                          { label: 'Workout Location', value: user && user.location ? user.location : 'Gym', icon: 'lucide-map-pin' },
                          { label: 'Experience Level', value: user && user.level ? user.level : 'Intermediate', icon: 'lucide-bar-chart' },
                          { label: 'Workout Frequency', value: user && user.schedule ? user.schedule : '4-5 days/week', icon: 'lucide-calendar-check' },
                          { label: 'Diet Preference', value: user && user.diet ? user.diet : 'Standard', icon: 'lucide-apple' },
                        ].map(item => (
                          <div key={item.label} className="p-3 rounded-xl bg-black/30 border border-[#1F1F46]/50">
                            <div className="flex items-center gap-1.5 mb-1">
                              <i className={`${item.icon} w-3 h-3 text-gray-500`}></i>
                              <span className="text-[9px] text-gray-500 font-bold uppercase tracking-wider">{item.label}</span>
                            </div>
                            <span className="text-xs font-bold text-white">{item.value}</span>
                          </div>
                        ))}
                      </div>
                      {user && user.injuries && user.injuries !== 'None' && (
                        <div className="mt-3 p-3 rounded-xl bg-yellow-500/5 border border-yellow-500/15">
                          <span className="text-[9px] text-yellow-400/70 font-bold uppercase tracking-wider block mb-1">⚠ Injury / Limitation</span>
                          <span className="text-xs text-yellow-300 font-bold">{user.injuries}</span>
                        </div>
                      )}
                    </div>

                    {/* Adjust Goal */}
                    <div id="profile-settings-section" className="glass-panel p-5 rounded-3xl glow-border card-radial-purple border-[#1F1F46]/50">
                      <div className="flex items-center gap-2 mb-4 pb-3 border-b border-[#1F1F46]/50">
                        <i className="lucide-settings w-4 h-4 text-[#9D00FF]"></i>
                        <span className="text-xs font-black font-outfit text-white uppercase tracking-wider">Adjust Active Goal</span>
                      </div>
                      <select
                        value={profile.goal}
                        onChange={(e) => { setProfile(prev => ({ ...prev, goal: e.target.value })); }}
                        className="w-full bg-[#121212] border border-[#1F1F46]/50 focus:border-[#00D2FF]/40 rounded-xl px-4 py-3 text-xs text-white outline-none transition-all cursor-pointer font-outfit"
                      >
                        <option value="bulk">💪 Muscle Gain (Caloric Surplus)</option>
                        <option value="shred">🔥 Fat Loss (Caloric Deficit)</option>
                        <option value="recomp">⚖️ Maintenance (Body Recomp)</option>
                      </select>
                    </div>

                  </div>
                </div>



                <div className={activeTab === 'challenges' ? "glass-panel p-8 rounded-3xl glow-border card-radial-blue text-center animate-bubble-appear max-w-md mx-auto" : "hidden"}>
                  <span className="text-2xl mb-4 block">🏆</span>
                  <h4 className="text-sm font-bold font-outfit text-white">Streaks & Challenges</h4>
                  <p className="text-xs text-gray-400 mt-2 leading-relaxed">
                    Compete in weekly hydration splits and calorie consistency targets. Pro status unlocking soon for community tournaments!
                  </p>
                </div>

                <div className={activeTab === 'community' ? "glass-panel p-8 rounded-3xl glow-border card-radial-purple text-center animate-bubble-appear max-w-md mx-auto" : "hidden"}>
                  <span className="text-2xl mb-4 block">👥</span>
                  <h4 className="text-sm font-bold font-outfit text-white">Athlete Guilds</h4>
                  <p className="text-xs text-gray-400 mt-2 leading-relaxed">
                    Connect, share diet blueprints, and compare strength score metrics with top-tier athletes around the world.
                  </p>
                </div>
</main>

              {/* MOBILE BOTTOM NAVIGATION BAR */}
              {(() => {
                const bottomTabs = [
                  { key: 'dashboard', name: 'Home', icon: 'lucide-layout-dashboard' },
                  { key: 'coach', name: 'AI Coach', icon: 'lucide-sparkles' },
                  { key: 'workouts', name: 'Workout Plan', icon: 'lucide-dumbbell' },
                  { key: 'calendar', name: 'Calendar', icon: 'lucide-calendar' },
                  { key: 'progress', name: 'Progress', icon: 'lucide-trending-up' },
                  { key: 'settings', name: 'Profile', icon: 'lucide-user-circle' },
                ];
                const activeIndex = bottomTabs.findIndex(t => t.key === activeTab);
                
                return (
                  <nav className="fixed bottom-0 left-0 right-0 lg:hidden h-[68px] border-t border-[#1F1F46]/50 bg-[#0A0A18]/80 backdrop-blur-lg flex items-center justify-around z-50 select-none pb-safe-bottom px-2 shadow-[0_-8px_32px_rgba(0,0,0,0.5)]">
                    {/* Active Sliding Indicator Bubble */}
                    <div 
                      className="absolute top-1.5 bottom-1.5 bg-gradient-to-r from-[#00D2FF]/10 to-[#9D00FF]/10 border border-[#00D2FF]/20 rounded-2xl transition-all duration-300 ease-[cubic-bezier(0.25,0.8,0.25,1)] pointer-events-none"
                      style={{
                        width: 'calc(16.66% - 8px)',
                        left: `calc(${activeIndex !== -1 ? activeIndex * 16.66 : 0}% + 4px)`,
                        opacity: activeIndex !== -1 ? 1 : 0,
                        boxShadow: '0 0 15px rgba(0, 210, 255, 0.05)'
                      }}
                    />
                    
                    {bottomTabs.map((tab) => {
                      const isActive = activeTab === tab.key;
                      return (
                        <button 
                          key={tab.key}
                          onClick={() => { setActiveTab(tab.key); }}
                          className={`flex flex-col items-center justify-center gap-1 flex-1 py-2 rounded-xl transition-all duration-200 cursor-pointer relative z-10 active:scale-90 ${
                            isActive 
                              ? 'text-white font-extrabold font-outfit' 
                              : 'text-gray-400 font-medium'
                          }`}
                        >
                          <i className={`${tab.icon} w-5 h-5 transition-transform duration-300 ${isActive ? 'text-[#00D2FF] scale-110' : 'text-gray-500'}`}></i>
                          <span className="text-[9px] tracking-wide block truncate">{tab.name}</span>
                          {isActive && (
                            <span className="absolute bottom-1 w-1.5 h-1.5 rounded-full bg-[#00D2FF] shadow-[0_0_8px_#00D2FF] animate-pulse" />
                          )}
                        </button>
                      );
                    })}
                  </nav>
                );
              })()}

            </div>
          </div>
        );
      };


      ReactDOM.createRoot(document.getElementById('root')).render(<App />);

      // Register PWA Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then((reg) => {
            console.log('ServiceWorker registered successfully with scope:', reg.scope);
          }).catch((err) => {
            console.log('ServiceWorker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
