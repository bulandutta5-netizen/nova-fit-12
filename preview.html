            consoleDiv.style.display = 'block';
            msgPre.textContent += text + '\n';

        // Capture promise rejections

          var msg = args.map(function(arg) {
            try {
              return typeof arg === 'object' ? JSON.stringify(arg) : String(arg);

              return String(arg);

          // Clean exponential sound gain envelope to protect speakers

                    goal === 'shred' || goal.toLowerCase().includes('loss')
                      ? (progressWeek === 1 ? 5 : progressWeek === 4 ? 14 : progressWeek === 8 ? 24 : 35)
                      : goal === 'bulk' || goal.toLowerCase().includes('gain')
                        ? (progressWeek === 1 ? 35 : progressWeek === 4 ? 26 : progressWeek === 8 ? 16 : 5)
                        : (progressWeek === 1 ? 20 : progressWeek === 4 ? 21 : progressWeek === 8 ? 23 : 25)
                  }
                  r="2.5"
                  fill="#9D00FF"
                  stroke="#fff"
                  strokeWidth="0.8"
                  className="animate-pulse"
                />
              </svg>

              {/* X axis labels */}
              <div className="flex justify-between text-[8px] text-gray-600 font-bold font-mono mt-1.5 px-1 pt-1.5 border-t border-[#1F1F46]/50">
                <span>Wk 1 ({startW}kg)</span>
                <span>Wk 4</span>
                <span>Wk 8</span>
                <span>Wk 12 ({weightData[6].w.toFixed(1)}kg)</span>
              </div>
            </div>

            {/* Slider to interact with predictions */}
            <div className="bg-white/[0.01] border border-[#1F1F46]/50 p-2.5 rounded-xl mb-4 text-[9.5px] font-mono leading-normal">
              <div className="flex justify-between items-center mb-1">
                <span className="text-gray-500">Timeline Phase:</span>
                <span className="text-white font-bold font-outfit text-[10px]">
                  {progressWeek <= 4 ? "Phase 1: CNS Prep" : progressWeek <= 8 ? "Phase 2: Lipid Burn" : "Phase 3: SubQ Lock"}
                </span>
              </div>
              <div className="flex justify-between items-center mb-2.5">
                <span className="text-gray-500">Predicted Mass:</span>
                <span className="text-[#00D2FF] font-black text-[11px]">{currentEstW} kg</span>
              </div>

              <input
                type="range"
                min="1"
                max="12"
                value={progressWeek}
                onChange={(e) => {
                  setProgressWeek(parseInt(e.target.value));
                  if (parseInt(e.target.value) % 3 === 0) {
                    try { playBeep(1000, 'sine', 0.03); } catch (ev) {}
                  }
                }}
                className="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-[#9D00FF]"
              />
              <div className="flex justify-between text-[7px] text-gray-500 font-bold mt-1 uppercase">
                <span>Week 1</span>
                <span>Week 6</span>
                <span>Week 12</span>
              </div>
            </div>

            <div className="flex justify-end pt-2 border-t border-[#1F1F46]/50">
              <button
                type="button"
                onClick={handlePdfDownload}
                disabled={pdfStatus === 'generating'}
                className="text-[9px] font-bold text-white font-outfit uppercase tracking-wider px-3.5 py-1.5 bg-gradient-to-r from-[#00D2FF] to-[#9D00FF] rounded-lg shadow-md hover:shadow-[0_0_12px_rgba(0,210,255,0.3)] transition-all flex items-center gap-1.5 cursor-pointer disabled:opacity-50"
              >
                {pdfStatus === 'generating' ? (
                  <>
                    <span className="w-2 h-2 border border-white border-t-transparent rounded-full animate-spin" />
                    Generating...
                  </>
                ) : pdfStatus === 'success' ? (
                  <>
                    <i className="lucide-check w-3 h-3 text-emerald-400"></i>
                    PDF Downloaded
                  </>
                ) : (
                  <>
                    <i className="lucide-file-text w-3 h-3"></i>
                    Download PDF
                  </>
                )}
              </button>
            </div>
          </div>
        );
      };

      // ======================================================
      // NEW COMPONENT: PREMIUM WORKOUT CALENDAR SYSTEM
      // ======================================================
      const WorkoutCalendar = ({ profile }) => {
        const level = profile.level || 'Intermediate';
        const location = profile.location || 'Gym';
        const injuries = profile.injuries || 'None';
        const calcs = profile.calculations || { targetCalories: 2200, targetProtein: 140 };

        const [calendarMode, setCalendarMode] = useState('monthly'); // 'monthly', 'weekly'
        const [selectedDay, setSelectedDay] = useState(null);
        const [reschedulingDay, setReschedulingDay] = useState(null);
        
        // Dynamic stats that update when workouts are completed
        const [completedDays, setCompletedDays] = useState([2, 4, 7, 9, 11, 14, 16, 18, 21, 23, 25]);
        const [missedDays, setMissedDays] = useState([12, 19]);
        const [streak, setStreak] = useState(3);
        const [hydration, setHydration] = useState(12);
        const [celebrationDay, setCelebrationDay] = useState(null);

        // Core base routines mapping for May 2026
        const [schedule, setSchedule] = useState(() => {
          const s = {};
          const daysInMonth = 31;
          
          let cycle = [];
          if (location === 'Home') {
            if (level === 'Beginner') {
              cycle = [
                { type: 'workout', name: 'Full Body A', duration: 35, cals: 210, exercises: ['Bodyweight Squats (3x15)', 'Incline Pushups (3x10)', 'Doorframe Towel Pulls (3x12)'], difficulty: 'Beginner', focus: 'CNS Prep' },
                { type: 'rest', name: 'Active Recovery', duration: 15, cals: 50, exercises: ['Mobility stretch (10m)', 'Light Core Plank (3x30s)'], difficulty: 'Rest', focus: 'Cellular Restoration' },
                { type: 'workout', name: 'Full Body B', duration: 40, cals: 240, exercises: ['Glute Bridges (3x15)', 'Chair Dips (3x8)', 'Backpack Rows (3x10)'], difficulty: 'Beginner', focus: 'CNS Prep' },
                { type: 'rest', name: 'Active Recovery', duration: 15, cals: 50, exercises: ['Dynamic Mobility Flow', 'Plank Walkholds (3x30s)'], difficulty: 'Rest', focus: 'Cellular Restoration' }
              ];
            } else {
              // Advanced/Intermediate Home
              cycle = [
                { type: 'workout', name: 'Upper Split', duration: 50, cals: 360, exercises: ['Regular Pushups (4x15)', 'Archer Pushups (3x8)', 'Backpack Rows (4x12)', 'Towel Facepulls (3x15)'], difficulty: 'Hard', focus: 'Upper Hypertrophy' },
                { type: 'workout', name: 'Lower Split', duration: 45, cals: 320, exercises: ['Bulgarian Split Squats (4x12)', 'Pistol Squats (3x6)', 'Single-Leg Calf Raises (4x15)'], difficulty: 'Intense', focus: 'Lower Hypertrophy' },
                { type: 'rest', name: 'Recovery Stretch', duration: 20, cals: 60, exercises: ['Stretching & Decompression', 'Yoga Flow (15m)', '15m Fasted Walk'], difficulty: 'Rest', focus: 'Joint Care' },
                { type: 'workout', name: 'Core & HIIT', duration: 35, cals: 300, exercises: ['Plank Walks (3x45s)', 'Burpees (4x45s)', 'Russian Twists (3x30/side)'], difficulty: 'Medium', focus: 'Core / Stamina' }
              ];
            }
          } else {
            // Gym Setup
            if (level === 'Beginner') {
              cycle = [
                { type: 'workout', name: 'Full Body A', duration: 45, cals: 290, exercises: ['Barbell Squats (3x8)', 'Barbell Bench Press (3x8)', 'Lat Pulldowns (3x10)'], difficulty: 'Beginner', focus: 'Strength Base' },
                { type: 'rest', name: 'Active Recovery', duration: 20, cals: 65, exercises: ['Joint mobility', 'Hanging Leg Raises (3x12)'], difficulty: 'Rest', focus: 'Restoration' },
                { type: 'workout', name: 'Posterior & Pulls', duration: 50, cals: 320, exercises: ['Romanian Deadlifts (3x10)', 'Seated Cable Rows (3x10)', 'Overhead Dumbbell Press (3x10)'], difficulty: 'Beginner', focus: 'Pull / Posterior' },
                { type: 'rest', name: 'Active Recovery', duration: 20, cals: 65, exercises: ['Dynamic Core Planks', 'Fasted morning LISS Walk'], difficulty: 'Rest', focus: 'Restoration' }
              ];
            } else if (level === 'Advanced') {
              cycle = [
                { type: 'workout', name: 'Push Hypertrophy', duration: 60, cals: 450, exercises: ['Incline Barbell Bench (4x8)', 'Flat DB Chest Press (3x10)', 'Dumbbell Lateral Raises (4x15)', 'Overhead Tricep Extension (3x12)'], difficulty: 'Extreme', focus: 'Anabolic Push' },
                { type: 'workout', name: 'Pull Hypertrophy', duration: 60, cals: 430, exercises: ['Weighted Pullups (4x6)', 'Barbell Bent Rows (4x8)', 'Chest-Supported DB Rows (3x12)', 'Hammer DB Curls (3x12)'], difficulty: 'Extreme', focus: 'Anabolic Pull' },
                { type: 'workout', name: 'Legs Performance', duration: 65, cals: 520, exercises: ['Barbell Back Squats (4x6)', 'Romanian Deadlifts (4x8)', 'Leg Extensions (3x15)', 'Seated Calf Raises (4x20)'], difficulty: 'Brutal', focus: 'Anabolic Lower' },
                { type: 'rest', name: 'Rest / Active Mobility', duration: 20, cals: 70, exercises: ['CNS Rest', 'Rotator Cuff exercises', '10m foam rolling'], difficulty: 'Rest', focus: 'CNS Reset' }
              ];
            } else {
              // Intermediate Gym
              cycle = [
                { type: 'workout', name: 'Upper A Split', duration: 55, cals: 380, exercises: ['Barbell Bench Press (4x6)', 'Barbell Bent Rows (4x8)', 'Incline DB Press (3x10)', 'Lateral DB Raises (3x12)'], difficulty: 'Hard', focus: 'Upper Strength' },
                { type: 'workout', name: 'Lower A Split', duration: 50, cals: 390, exercises: ['Barbell Back Squats (4x6)', 'Romanian Deadlifts (3x8)', 'Leg Press (3x12)', 'Calf Raises (4x15)'], difficulty: 'Hard', focus: 'Lower Strength' },
                { type: 'rest', name: 'Recovery Stretch', duration: 20, cals: 60, exercises: ['Stretching & Decompression', 'Dynamic Mobility flow (10m)'], difficulty: 'Rest', focus: 'CNS Downregulate' },
                { type: 'workout', name: 'Upper B Split', duration: 50, cals: 360, exercises: ['Overhead Press (OHP) (4x6)', 'Wide Grip Pullups (4x8)', 'DB Incline Flyes (3x12)', 'Hammer Curls (3x12)'], difficulty: 'Hard', focus: 'Upper Hypertrophy' }
              ];
            }
          }

          // Distribute the cycle rolling over the 31 days
          for (let d = 1; d <= daysInMonth; d++) {
            s[d] = { ...cycle[(d - 1) % cycle.length], dayNum: d };
          }
          return s;
        });

        // Current open day details
        const selectedDayDetails = selectedDay ? schedule[selectedDay] : null;

        // Interactive checking states in modal panel
        const [exerciseChecks, setExerciseChecks] = useState({});

        // Calculate consistency score dynamically
        const totalPastDays = completedDays.length + missedDays.length;
        const consistencyScore = totalPastDays > 0 ? Math.round((completedDays.length / totalPastDays) * 100) : 100;

        // Toggle checkbox inside detail panel
        const toggleExerciseCheck = (exName) => {
          setExerciseChecks(prev => ({ ...prev, [exName]: !prev[exName] }));
          try { playBeep(700, 'triangle', 0.05); } catch(e) {}
        };

        // Mark current workout as fully completed
        const handleMarkComplete = (day) => {
          if (completedDays.includes(day)) return;

          setCompletedDays(prev => [...prev, day].sort((a,b)=>a-b));
          setMissedDays(prev => prev.filter(d => d !== day));
          setStreak(prev => prev + 1);
          
          // Play success chime
          try {
            playBeep(900, 'sine', 0.08);
            setTimeout(() => playBeep(1200, 'sine', 0.1), 120);
          } catch(e) {}

          // Refresh details in modal
          setExerciseChecks({});
          setSelectedDay(null);
          setCelebrationDay(day); // Trigger achievement celebration!
        };

        // Reschedule action: Shift to tomorrow (swaps schedule item with tomorrow's rest or shifts everything)
        const handleReschedule = (day) => {
          const targetDay = day === 31 ? 30 : day + 1;
          
          setSchedule(prev => {
            const copy = { ...prev };
            const temp = copy[day];
            copy[day] = { ...copy[targetDay], dayNum: day };
            copy[targetDay] = { ...temp, dayNum: targetDay };
            return copy;
          });

          // Play click sound
          try { playBeep(600, 'sine', 0.08); } catch(e) {}
          setReschedulingDay(null);
          setSelectedDay(null);
          alert(`Success: Workout rescheduled. Swapped Day ${day} with Day ${targetDay}!`);
        };

        // Apply injury adaptations to exercises inside detail panel
        const getAdaptedExercises = (dayItem) => {
          if (!dayItem || !dayItem.exercises) return [];
          return dayItem.exercises.map(ex => {
            let name = ex;
            let isModified = false;

            if (injuries.toLowerCase().includes('knee') && ex.includes('Back Squats')) {
              name = "Box Squats (Knee-Safe option)";
              isModified = true;
            } else if (injuries.toLowerCase().includes('back') && (ex.includes('Deadlift') || ex.includes('Back Squats'))) {
              name = ex.includes('Deadlift') ? "Chest-Supported DB Rows" : "Goblet Squats (Spine-Safe)";
              isModified = true;
            } else if (injuries.toLowerCase().includes('shoulder') && (ex.includes('Bench Press') || ex.includes('OHP') || ex.includes('Overhead'))) {
              name = "Neutral DB Press (Shoulder-Safe)";
              isModified = true;
            }
            return { raw: ex, name, isModified };
          });
        };

        // Render Calendar Grid (31 Days of May 2026)
        const renderDaysGrid = () => {
          const dayElements = [];
          for (let d = 1; d <= 31; d++) {
            const item = schedule[d];
            const isCompleted = completedDays.includes(d);
            const isMissed = missedDays.includes(d);
            const isRest = item.type === 'rest';
            const isToday = d === 29; // Today's coordinate

            let borderStyle = "border-[#1F1F46]/50 hover:border-[#00D2FF]/20";
            let bgStyle = "bg-[#0F0F24]/40 hover:bg-[#0F0F24]/80";
            let indicatorColor = "text-gray-500";
            let labelBadge = null;

            if (isCompleted) {
              borderStyle = "border-emerald-500/30 hover:border-emerald-500/50";
              bgStyle = "bg-emerald-500/5 hover:bg-emerald-500/10";
              indicatorColor = "text-emerald-400";
              labelBadge = "✓";
            } else if (isMissed) {
              borderStyle = "border-red-500/20 hover:border-red-500/40";
              bgStyle = "bg-red-500/5 hover:bg-red-500/10";
              indicatorColor = "text-red-400";
              labelBadge = "!";
            } else if (isRest) {
              borderStyle = "border-blue-500/10 hover:border-blue-500/35";
              bgStyle = "bg-blue-500/[0.02] hover:bg-blue-500/5";
              indicatorColor = "text-blue-500";
            }

            if (isToday) {
              borderStyle = "border-[#00D2FF] shadow-[0_0_15px_rgba(0,210,255,0.25)] ring-1 ring-[#00D2FF]/30";
              bgStyle = "bg-gradient-to-br from-[#121215]/90 to-[#0B0B0C]";
            }

            dayElements.push(
              <div
                key={d}
                onClick={() => {
                  playBeep(900, 'sine', 0.04);
                  setSelectedDay(d);
                }}
                className={`p-3 rounded-2xl border ${borderStyle} ${bgStyle} cursor-pointer transition-all duration-300 flex flex-col justify-between aspect-square select-none relative group`}
              >
                <div className="flex justify-between items-start">
                  <span className={`text-[11px] font-bold font-mono ${isToday ? 'text-[#00D2FF]' : 'text-gray-400'}`}>
                    {d}
                  </span>
                  {labelBadge && (
                    <span className={`text-[9px] font-black font-mono shrink-0 px-1 rounded uppercase ${
                      isCompleted ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'
                    }`}>
                      {labelBadge}
                    </span>
                  )}
                </div>

                <div className="text-left mt-auto">
                  <span className="text-[7.5px] font-bold font-outfit uppercase tracking-wide block truncate text-gray-500 group-hover:text-white transition-colors">
                    {item.name}
                  </span>
                  <span className={`text-[7px] font-mono block truncate ${indicatorColor} font-bold mt-0.5 uppercase`}>
                    {isRest ? "REST & RECOVER" : item.focus}
                  </span>
                </div>

                {isToday && (
                  <span className="absolute top-1 right-1.5 flex h-1.5 w-1.5 shrink-0">
                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#00D2FF] opacity-75"></span>
                    <span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-[#00D2FF]"></span>
                  </span>
                )}
              </div>
            );
          }
          return dayElements;
        };

        // Render Weekly List view for simulated mobile swiping
        const renderWeeklyListView = () => {
          const daysOfWeek = [];
          // Render days 25 to 31 (current week in May 2026)
          for (let d = 25; d <= 31; d++) {
            const item = schedule[d];
            const isCompleted = completedDays.includes(d);
            const isMissed = missedDays.includes(d);
            const isToday = d === 29;
            const isRest = item.type === 'rest';

            let borderStyle = "border-[#1F1F46]/50";
            let bgStyle = "bg-[#0F0F24]/50";
            let indicator = <div className="w-2 h-2 rounded-full bg-gray-600" />;

            if (isCompleted) {
              borderStyle = "border-emerald-500/20";
              bgStyle = "bg-emerald-500/5";
              indicator = <i className="lucide-check-circle2 text-emerald-400 w-4 h-4"></i>;
            } else if (isMissed) {
              borderStyle = "border-red-500/10";
              bgStyle = "bg-red-500/5";
              indicator = <i className="lucide-alert-circle text-red-400 w-4 h-4"></i>;
            } else if (isRest) {
              borderStyle = "border-blue-500/10";
              bgStyle = "bg-blue-500/[0.02]";
              indicator = <i className="lucide-battery-charging text-blue-500 w-4 h-4"></i>;
            }

            if (isToday) {
              borderStyle = "border-[#00D2FF]";
              bgStyle = "bg-gradient-to-r from-[#121215] to-[#0A0A0C]";
              indicator = <span className="w-2.5 h-2.5 rounded-full bg-[#00D2FF] shadow-[0_0_8px_#00D2FF] animate-pulse" />;
            }

            daysOfWeek.push(
              <div
                key={d}
                onClick={() => setSelectedDay(d)}
                className={`p-4 rounded-2xl border ${borderStyle} ${bgStyle} cursor-pointer transition-all duration-300 flex items-center justify-between select-none`}
              >
                <div className="flex items-center gap-3">
                  <span className={`text-[12px] font-bold font-mono ${isToday ? 'text-[#00D2FF]' : 'text-gray-400'}`}>
                    Day {d}
                  </span>
                  <div>
                    <h4 className="text-[11px] font-bold text-white font-outfit uppercase tracking-wide">{item.name}</h4>
                    <p className="text-[8.5px] text-gray-500 font-semibold uppercase mt-0.5">{isRest ? 'Rest / Mobility' : item.focus}</p>
                  </div>
                </div>

                <div className="flex items-center gap-3">
                  <span className="text-[9px] text-gray-500 font-mono font-bold uppercase">{item.duration} min | {item.cals} kcal</span>
                  {indicator}
                </div>
              </div>
            );
          }
          return daysOfWeek;
        };

        return (
          <div className="flex flex-col gap-6 max-w-5xl mx-auto p-1 text-left select-none relative z-10">
            {/* Calendar Dashboard Stats Header */}
            <div className="grid grid-cols-1 sm:grid-cols-4 gap-4 w-full">
              {/* Streaks Card */}
              <div className="glass-panel p-4 rounded-2xl glow-border card-radial-blue border-[#1F1F46]/50 flex items-center gap-4">
                <div className="p-3 bg-orange-500/15 text-orange-500 rounded-xl shrink-0"><i className="lucide-flame w-5 h-5 fill-orange-500/10"></i></div>
                <div className="min-w-0 flex-1">
                  <span className="text-[9px] text-gray-500 font-bold block uppercase tracking-wider truncate">Active Streak</span>
                  <span className="text-sm sm:text-[11px] md:text-xs lg:text-sm xl:text-base 2xl:text-lg font-black font-outfit text-white mt-0.5 block truncate">{streak} Days Solid</span>
                </div>
              </div>

              {/* Consistency Card */}
              <div className="glass-panel p-4 rounded-2xl glow-border card-radial-purple border-[#1F1F46]/50 flex items-center gap-4">
                <div className="p-3 bg-[#00F0FF]/10 text-[#00F0FF] rounded-xl shrink-0"><i className="lucide-activity w-5 h-5"></i></div>
                <div className="min-w-0 flex-1">
                  <span className="text-[9px] text-gray-500 font-bold block uppercase tracking-wider truncate">Consistency Rating</span>
                  <span className="text-sm sm:text-[11px] md:text-xs lg:text-sm xl:text-base 2xl:text-lg font-black font-outfit text-white mt-0.5 block truncate">{consistencyScore}% Target Lock</span>
                </div>
              </div>

              {/* Hydration cups tracker */}
              <div className="glass-panel p-4 rounded-2xl glow-border card-radial-blue border-[#1F1F46]/50 flex items-center gap-4">
                <div className="p-3 bg-blue-500/15 text-blue-500 rounded-xl shrink-0"><i className="lucide-droplet w-5 h-5 fill-blue-500/10"></i></div>
                <div className="min-w-0 flex-1">
                  <div className="flex justify-between items-center pr-2 gap-1">
                    <span className="text-[9px] text-gray-500 font-bold uppercase tracking-wider block truncate">Hydration Habit</span>
                    <button
                      onClick={() => { setHydration(prev => Math.min(18, prev + 1)); try { playBeep(800, 'sine', 0.05); } catch(e) {} }}
                      className="text-[8px] font-black uppercase text-[#00F0FF] bg-[#00F0FF]/15 border border-[#00F0FF]/30 px-1.5 py-0.5 rounded cursor-pointer transition-all shrink-0 hover:bg-[#00F0FF]/25"
                    >
                      + Cup
                    </button>
                  </div>
                  <span className="text-sm sm:text-[11px] md:text-xs lg:text-sm xl:text-base 2xl:text-lg font-black font-outfit text-white mt-0.5 block truncate">{hydration} / 14 Cups Logged</span>
                </div>
              </div>

              {/* Workout splits overview card */}
              <div className="glass-panel p-4 rounded-2xl glow-border card-radial-purple border-[#1F1F46]/50 flex items-center gap-4">
                <div className="p-3 bg-[#9D00FF]/10 text-[#9D00FF] rounded-xl shrink-0"><i className="lucide-dumbbell w-5 h-5"></i></div>
                <div className="min-w-0 flex-1">
                  <span className="text-[9px] text-gray-500 font-bold block uppercase tracking-wider truncate">Target Level Split</span>
                  <span className="text-sm sm:text-[11px] md:text-xs lg:text-sm xl:text-base 2xl:text-lg font-black font-outfit text-white mt-0.5 block truncate uppercase">{level} {location}</span>
                </div>
              </div>
            </div>

            {/* Mode Selector Tab & Title Header */}
            <div className="glass-panel p-4 rounded-3xl border-[#1F1F46]/50 flex flex-col sm:flex-row sm:items-center justify-between gap-4 bg-black/20">
              <div className="flex items-center gap-2.5">
                <i className="lucide-calendar text-[#00D2FF] w-5 h-5"></i>
                <div>
                  <h3 className="text-md font-bold text-white font-outfit">AI Performance Calendar</h3>
                  <p className="text-[10px] text-gray-500 font-semibold uppercase font-mono mt-0.5">May 2026 Transformation block</p>
                </div>
              </div>

              {/* View switch toggles */}
              <div className="flex bg-white/5 p-1 rounded-xl border border-[#1F1F46]/50 gap-1 shrink-0 self-start sm:self-auto select-none">
                {[
                  { id: 'monthly', label: 'Monthly Grid' },
                  { id: 'weekly', label: 'Weekly Swiper' }
                ].map(tab => (
                  <button
                    key={tab.id}
                    type="button"
                    onClick={() => { playBeep(900, 'sine', 0.05); setCalendarMode(tab.id); }}
                    className={`px-3 py-1.5 rounded-lg text-[9.5px] font-bold uppercase tracking-wider transition-all cursor-pointer ${
                      calendarMode === tab.id 
                        ? 'bg-gradient-to-r from-[#00D2FF] to-[#9D00FF] text-white shadow-sm' 
                        : 'text-gray-400 hover:text-white'
                    }`}
                  >
                    {tab.label}
                  </button>
                ))}
              </div>
            </div>

            {/* 31-Day Grid / Weekly Spline Container */}
            {calendarMode === 'monthly' ? (
              <div className="grid grid-cols-2 sm:grid-cols-7 gap-4 w-full bg-black/10 p-1 rounded-3xl">
                {renderDaysGrid()}
              </div>
            ) : (
              <div className="flex flex-col gap-4 w-full bg-black/10 p-3 rounded-3xl max-w-xl mx-auto">
                {/* Desktop vertical weekly list */}
                <div className="hidden lg:flex flex-col gap-3 w-full">
                  <div className="flex items-center justify-between border-b border-[#1F1F46]/50 pb-2 px-1 mb-1 font-mono text-[9px] text-gray-500 font-bold select-none uppercase">
                    <span>Simulated Rolling Week View</span>
                    <span>Scroll below</span>

      // 1. Particle Background Component
      const ParticleBackground = () => {
        const canvasRef = useRef(null);

        useEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          if (!ctx) return;

          let animationFrameId;
          let particles = [];
          const mouse = { x: null, y: null, radius: 120 };

          const resizeCanvas = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
          };

          class Particle {
            constructor(x, y) {
              this.x = x;
              this.y = y;
              this.size = Math.random() * 2 + 1;
              this.vx = (Math.random() - 0.5) * 0.5;
              this.vy = (Math.random() - 0.5) * 0.5;
            }
            draw() {
              ctx.fillStyle = 'rgba(0, 210, 255, 0.4)';
              ctx.beginPath();
              ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
              ctx.closePath();
              ctx.fill();
            }
            update() {
              this.x += this.vx;
              this.y += this.vy;
              if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
              if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;

              if (mouse.x !== null && mouse.y !== null) {
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius) {
                  const force = (mouse.radius - distance) / mouse.radius;
                  this.x -= (dx / distance) * force * 5;
                  this.y -= (dy / distance) * force * 5;
                }
              }
            }
          }

          const initParticles = () => {
            particles = [];
            const numberOfParticles = Math.floor((canvas.width * canvas.height) / 14000);
            for (let i = 0; i < numberOfParticles; i++) {
              particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
            }
          };

          const connectParticles = () => {
            const maxDistance = 100;
            for (let a = 0; a < particles.length; a++) {
              for (let b = a + 1; b < particles.length; b++) {
                const dx = particles[a].x - particles[b].x;
                const dy = particles[a].y - particles[b].y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < maxDistance) {
                  const opacity = 1 - (distance / maxDistance);
                  ctx.strokeStyle = `rgba(157, 0, 255, ${opacity * 0.1})`;
                  ctx.lineWidth = 0.5;
                  ctx.beginPath();
                  ctx.moveTo(particles[a].x, particles[a].y);
                  ctx.lineTo(particles[b].x, particles[b].y);
                  ctx.stroke();
                }
              }
            }
          };

          const animate = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0B0B0B';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Glow spots
            ctx.fillStyle = 'rgba(0, 240, 255, 0.015)';
            ctx.beginPath();
            ctx.arc(canvas.width * 0.8, canvas.height * 0.2, 300, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(157, 0, 255, 0.015)';
            ctx.beginPath();
            ctx.arc(canvas.width * 0.2, canvas.height * 0.8, 450, 0, Math.PI * 2);
            ctx.fill();

            particles.forEach(p => { p.update(); p.draw(); });
            connectParticles();
            animationFrameId = requestAnimationFrame(animate);
          };

          window.addEventListener('resize', resizeCanvas);
          window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
          window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });

          resizeCanvas();
          animate();

          return () => {
            window.removeEventListener('resize', resizeCanvas);
            cancelAnimationFrame(animationFrameId);
          };
        }, []);

        return <canvas ref={canvasRef} className="fixed inset-0 w-full h-full -z-50 pointer-events-none" />;
      };

      // 2. Navbar Component

      // 4. Calculator Component
      const Calculator = ({ onCalculate }) => {
        const [formData, setFormData] = useState({
          age: '25',
          gender: 'male',
          weight: '75',
          height: '180',
          activity: '1.55',
          goal: 'maintain'
        });
        const [results, setResults] = useState(null);

        const handleInputChange = (e) => {
          const { name, value } = e.target;
          setFormData(prev => ({ ...prev, [name]: value }));
        };

        const calculateMetabolism = (e) => {
          if (e) e.preventDefault();
          const age = parseFloat(formData.age);
          const weight = parseFloat(formData.weight);
          const height = parseFloat(formData.height);
          const activity = parseFloat(formData.activity);
          const gender = formData.gender;
          const goal = formData.goal;

          if (!age || !weight || !height) return;

          const heightM = height / 100;
          const bmi = (weight / (heightM * heightM)).toFixed(1);
          let bmiCategory = 'Healthy Weight';
          if (bmi < 18.5) bmiCategory = 'Underweight';
          else if (bmi >= 25 && bmi < 30) bmiCategory = 'Overweight';
          else if (bmi >= 30) bmiCategory = 'Obese';

          let bmr = gender === 'male' 
            ? (10 * weight + 6.25 * height - 5 * age + 5)
            : (10 * weight + 6.25 * height - 5 * age - 161);

          const tdee = Math.round(bmr * activity);
          let targetCalories = tdee;
          if (goal === 'lose') targetCalories = tdee - 500;
          else if (goal === 'gain') targetCalories = tdee + 400;

          let pPct = 0.25, cPct = 0.45, fPct = 0.30;
          if (goal === 'lose') { pPct = 0.35; cPct = 0.35; fPct = 0.30; }
          else if (goal === 'gain') { pPct = 0.30; cPct = 0.45; fPct = 0.25; }

          const calcResults = {
            bmi,
            bmiCategory,
            targetCalories,
            protein: { pct: Math.round(pPct * 100), grams: Math.round((targetCalories * pPct) / 4) },
            carbs: { pct: Math.round(cPct * 100), grams: Math.round((targetCalories * cPct) / 4) },
            fat: { pct: Math.round(fPct * 100), grams: Math.round((targetCalories * fPct) / 9) }
          };

          setResults(calcResults);
          onCalculate({ ...formData, ...calcResults });
        };

        useEffect(() => {
          calculateMetabolism();
        }, []);

        return (
          <section id="nutrition" className="py-12 sm:py-20 md:py-24 px-4 sm:px-6 relative">
            <div className="absolute top-10 left-10 w-96 h-96 bg-electricBlue/5 rounded-full blur-[100px] pointer-events-none -z-10" />

              <div className="text-center mb-10 md:mb-16">
                <span className="text-xs font-bold tracking-widest text-[#00F0FF] uppercase flex items-center justify-center gap-1.5 mb-3 font-outfit">
                  <i className="lucide-sparkles w-3.5 h-3.5"></i> METABOLIC ENGINE

                <h2 className="text-3xl md:text-5xl font-bold font-outfit text-white">Calculate Your Vitals</h2>
                <p className="text-gray-400 mt-4 max-w-xl mx-auto text-sm">Input your vitals to run our metabolic engine. We will map out your exact calorie threshold and target macronutrients.</p>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-stretch">
                <div className="glass-panel p-8 rounded-3xl glow-border flex flex-col justify-between card-radial-blue">
                  <form onSubmit={calculateMetabolism} className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                      <label className="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Age</label>
                      <input type="number" name="age" value={formData.age} onChange={handleInputChange} className="w-full bg-[#161616] border border-[#1F1F46]/50 focus:border-[#00D2FF]/40 rounded-xl px-4 py-3 text-white text-sm outline-none transition-all" required />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Gender</label>
                      <select name="gender" value={formData.gender} onChange={handleInputChange} className="w-full bg-[#161616] border border-[#1F1F46]/50 focus:border-[#00D2FF]/40 rounded-xl px-4 py-3 text-white text-sm outline-none transition-all appearance-none cursor-pointer">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Weight (kg)</label>
                      <input type="number" name="weight" value={formData.weight} onChange={handleInputChange} className="w-full bg-[#161616] border border-[#1F1F46]/50 focus:border-[#00D2FF]/40 rounded-xl px-4 py-3 text-white text-sm outline-none transition-all" required />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Height (cm)</label>
                      <input type="number" name="height" value={formData.height} onChange={handleInputChange} className="w-full bg-[#161616] border border-[#1F1F46]/50 focus:border-[#00D2FF]/40 rounded-xl px-4 py-3 text-white text-sm outline-none transition-all" required />
                    </div>
                    <div className="sm:col-span-2">
                      <label className="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Activity Level</label>
                      <select name="activity" value={formData.activity} onChange={handleInputChange} className="w-full bg-[#161616] border border-[#1F1F46]/50 focus:border-[#00D2FF]/40 rounded-xl px-4 py-3 text-white text-sm outline-none cursor-pointer">
                        <option value="1.2">Sedentary (Little to no exercise)</option>
                        <option value="1.375">Lightly Active (Light exercise 1-3 days/wk)</option>
                        <option value="1.55">Moderately Active (Moderate exercise 3-5 days/wk)</option>
                        <option value="1.725">Very Active (Hard exercise 6-7 days/wk)</option>
                        <option value="1.9">Extra Active (Very intense physical job/training)</option>
                      </select>
                    </div>
                    <div className="sm:col-span-2">
                      <label className="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Target Goal</label>
                      <select name="goal" value={formData.goal} onChange={handleInputChange} className="w-full bg-[#161616] border border-[#1F1F46]/50 focus:border-[#00D2FF]/40 rounded-xl px-4 py-3 text-white text-sm outline-none cursor-pointer">

                        <option value="maintain">Maintain Weight (Caloric Balance)</option>
                        <option value="gain">Muscle Gain (Caloric Surplus)</option>
                      </select>
                    </div>
                    <button type="submit" className="shimmer-btn sm:col-span-2 mt-4 py-4 rounded-xl bg-gradient-to-r from-[#00D2FF] to-[#9D00FF] hover:shadow-[0_0_20px_rgba(0,210,255,0.3)] text-white font-semibold text-sm transition-all duration-300">
                      GET MY CUSTOM MACROS

                  </form>
                </div>

                {/* Results Visualizer */}
                <div className="glass-panel p-8 rounded-3xl glow-border flex flex-col justify-center items-center card-radial-purple">
                  {results && (
                    <div className="w-full flex flex-col items-center">

                            <circle cx="88" cy="88" r="76" className="stroke-[#00D2FF]" strokeWidth="10" fill="transparent" strokeDasharray={2*Math.PI*76} strokeDashoffset={2*Math.PI*76*0.18} strokeLinecap="round" />
                          </svg>
                          <div className="absolute text-center">
                            <span className="text-3xl font-extrabold font-outfit text-white">{results.targetCalories.toLocaleString()}</span>
                            <span className="text-[10px] font-semibold text-gray-400 mt-1 uppercase tracking-wider block">Kcal / Day</span>
                          </div>
                        </div>
                        <div className="text-center sm:text-left flex flex-col gap-4">
                          <div>
                            <span className="text-xs text-gray-500 font-semibold uppercase tracking-wider block">Body Mass Index (BMI)</span>
                            <div className="flex items-baseline gap-2 mt-1 justify-center sm:justify-start">
                              <span className="text-4xl font-extrabold font-outfit text-white">{results.bmi}</span>
                              <span className="text-xs font-semibold px-2 py-0.5 rounded-md bg-[#00F0FF]/15 text-[#00F0FF]">{results.bmiCategory}</span>
                            </div>
                          </div>
                          <div>
                            <span className="text-xs text-gray-500 font-semibold uppercase tracking-wider block">Goal Strategy</span>
                            <span className="text-sm font-semibold text-gray-300 mt-1 block">{formData.goal === 'lose' ? '500 kcal Deficit (Fat Burn)' : formData.goal === 'gain' ? '400 kcal Surplus (Anabolic)' : 'Maintenance (Recomp)'}</span>
                          </div>
                        </div>
                      </div>

                      <div className="w-full flex flex-col gap-5">
                        <div>
                          <div className="flex justify-between items-center text-xs font-semibold mb-2">
                            <span className="text-gray-400 uppercase">Protein ({results.protein.pct}%)</span>
                            <span className="text-[#00D2FF] font-bold">{results.protein.grams}g</span>

                          </div>
                        </div>
                        <div>
                          <div className="flex justify-between items-center text-xs font-semibold mb-2">
                            <span className="text-gray-400 uppercase">Carbohydrates ({results.carbs.pct}%)</span>
                            <span className="text-[#9D00FF] font-bold">{results.carbs.grams}g</span>
                          </div>
                          <div className="w-full h-2.5 bg-[#1F1F1F] rounded-full overflow-hidden">
                            <div className="h-full bg-[#9D00FF] rounded-full" style={{ width: `${results.carbs.pct}%` }} />
                          </div>
                        </div>
                        <div>
                          <div className="flex justify-between items-center text-xs font-semibold mb-2">
                            <span className="text-gray-400 uppercase">Fats ({results.fat.pct}%)</span>
                            <span className="text-yellow-400 font-bold">{results.fat.grams}g</span>

                          <div className="w-full h-2.5 bg-[#1F1F1F] rounded-full overflow-hidden">
                            <div className="h-full bg-yellow-400 rounded-full" style={{ width: `${results.fat.pct}%` }} />

                        </div>

      // 5. DietPlanner Component
      const DietPlanner = ({ userProfile }) => {
        const [selectedDiet, setSelectedDiet] = useState('vegetarian');
        
        // Mock diet planner meals database
        const getMealsForDiet = (type, cals) => {

      const calculateBiometrics = (profile) => {
        const w = parseFloat(profile.weight);
        const h = parseFloat(profile.height);
        const a = parseInt(profile.age);
        
        if (isNaN(w) || isNaN(h) || isNaN(a)) return null;

        let bmr = 0;
        if (profile.gender.toLowerCase().includes('female')) {
          bmr = 10 * w + 6.25 * h - 5 * a - 161;
        } else {
          bmr = 10 * w + 6.25 * h - 5 * a + 5;
        }

        let multiplier = 1.2;
        if (profile.schedule.includes('3')) multiplier = 1.375;
        else if (profile.schedule.includes('4') || profile.schedule.includes('5')) multiplier = 1.55;
        else if (profile.schedule.includes('6')) multiplier = 1.725;

        const tdee = Math.round(bmr * multiplier);

        let targetCalories = tdee;
        if (profile.goal.includes('Fat Loss') || profile.goal.includes('Weight')) {
          targetCalories = Math.max(1200, tdee - 500);
        } else if (profile.goal.includes('Muscle')) {
          targetCalories = tdee + 300;
        } else if (profile.goal.includes('Recomposition') || profile.goal.includes('Recomp')) {
          targetCalories = tdee - 150;
        }

        let proteinMultiplier = 1.6;
        if (profile.goal.includes('Muscle') || profile.goal.includes('Strength') || profile.goal.includes('Size')) {
          proteinMultiplier = 2.0;
        } else if (profile.goal.includes('Fat Loss') || profile.goal.includes('Shred')) {
          proteinMultiplier = 2.2;
        } else if (profile.goal.includes('Performance') || profile.goal.includes('Speed') || profile.goal.includes('Athletic') || profile.goal.includes('Fitness')) {
          proteinMultiplier = 1.8;
        }
        const targetProtein = Math.round(w * proteinMultiplier);
        const targetCarbs = Math.round((targetCalories * 0.40) / 4);
        const targetFats = Math.round((targetCalories * 0.30) / 9);

        return {
          bmr: Math.round(bmr),
          tdee,
          targetCalories,
          targetProtein,
          targetCarbs,
          targetFats,
          weight: w,
          height: h,
          age: a,
          gender: profile.gender,
          multiplier,
          proteinMultiplier,
          offset: targetCalories - tdee
        };
      };

      const TypewriterText = ({ text, onComplete, scrollRef, isAlreadyTyped }) => {
        const [displayedText, setDisplayedText] = React.useState('');
        
        React.useEffect(() => {
          if (isAlreadyTyped) {
            setDisplayedText(text);
            if (onComplete) onComplete();
            return;
          }
          
          const words = text.split(' ');
          let currentIdx = 0;
          let tempText = '';
          
          const interval = setInterval(() => {
            if (currentIdx >= words.length) {
              clearInterval(interval);
              if (onComplete) onComplete();
              return;
            }
            tempText += (currentIdx === 0 ? '' : ' ') + words[currentIdx];
            setDisplayedText(tempText);
            currentIdx++;
            
            // Auto-scroll-to-bottom on every word tick (localized to container)
            if (scrollRef && scrollRef.current) {
              scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }
          }, 25); // ~25ms per word
          
          return () => clearInterval(interval);
        }, [text, isAlreadyTyped]);
        
        return <span className="whitespace-pre-line font-medium font-sans">{displayedText}</span>;
      };

              gain.connect(audioCtx.destination);

                    <div className="p-3 bg-[#0F0F24] border border-[#1F1F46]/50 text-gray-400 rounded-2xl rounded-tl-none flex items-center gap-1.5 text-[10px]">
                      <span className="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce [animation-delay:0s]" />
                      <span className="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce [animation-delay:0.15s]" />
                      <span className="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce [animation-delay:0.3s]" />
                    </div>
                  </div>
                )}
              </div>

              {/* Chat Input Area + Siri Soundwave at the bottom */}
              <div className="border-t border-[#1F1F46]/50 pt-3 mt-2 flex flex-col gap-2">
                <Soundwave isSpeaking={isSpeaking} isTyping={isTyping} />
                
                <div className="flex gap-2 items-center">
                  <button 
                    onClick={simulateSpeechInput}
                    className={`p-2.5 rounded-xl border transition-all cursor-pointer shrink-0 ${
                      isSpeaking ? 'bg-red-500/10 border-red-500/20 text-red-400' : 'bg-[#0F0F24] border-[#1F1F46]/50 text-gray-500 hover:text-white'
                    }`}
                  >
                    <i className="lucide-mic w-4 h-4"></i>
                  </button>
                  
                  <input 
                    type="text" 
                    value={inputText}
                    onChange={(e) => setInputText(e.target.value)}
                    onKeyDown={(e) => { if (e.key === 'Enter') { handleSendMessage(inputText); setInputText(''); } }}
                    placeholder="Type message to Coach..."
                    className="flex-1 bg-[#0F0F24] border border-[#1F1F46]/50 rounded-xl px-3 py-2 text-[11px] text-white outline-none focus:border-[#00D2FF]/30 placeholder-gray-600 min-w-0"
                  />
                  
                  <button 
                    onClick={() => { if (inputText.trim()) { handleSendMessage(inputText); setInputText(''); } }}
                    className="p-2.5 rounded-xl bg-gradient-to-r from-electricBlue to-neonPurple text-white cursor-pointer active:scale-95 transition-all shrink-0"
                  >
                    <i className="lucide-send-horizontal w-4 h-4"></i>
                  </button>
                </div>
              </div>
            </div>
          );
        }

        

        return (
          <section id="chatbot" className="py-12 sm:py-20 md:py-24 px-4 sm:px-6 relative select-none">
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-electricBlue/5 rounded-full blur-[130px] pointer-events-none -z-10" />

            <div className="max-w-7xl mx-auto">
              {/* Section Header */}
              <div className="text-center mb-10 md:mb-16">
                <span className="text-xs font-bold tracking-widest text-[#00F0FF] uppercase flex items-center justify-center gap-1.5 mb-3 font-outfit">
                  <i className="lucide-sparkles w-3 h-3"></i> Core Intelligence Node
                </span>
                <h2 className="text-3xl md:text-5xl font-bold font-outfit text-white">
                  NovaFit Elite AI Coach
                </h2>
                <p className="text-gray-400 mt-4 max-w-xl mx-auto text-sm">
                  Consult Coach Nova, your CSCS certified AI Strength & Transformation mentor, for hyper-personalized macros and structural workout adaptation.
                </p>
              </div>

              {/* 3-Column Grid */}
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-stretch h-[680px] max-w-6xl mx-auto">
                {/* Column 1: Profile (3 cols) */}
                <div className="hidden lg:flex lg:col-span-3 h-full min-h-0 flex-col justify-start gap-4 glass-panel p-5 rounded-3xl glow-border card-radial-purple border-[#1F1F46]/50 relative overflow-hidden">
                  <div className="absolute inset-0 bg-gradient-to-b from-transparent via-[#00F0FF]/5 to-transparent h-[200%] w-full pointer-events-none animate-hologram-scan" />
                  
                  <div className="z-10 text-center">
                    <span className="text-[8px] text-[#00F0FF] font-bold uppercase tracking-widest border border-[#00F0FF]/30 px-2 py-0.5 rounded bg-[#00F0FF]/5 font-outfit inline-block mb-3">
                      AI INTEL NODE
                    </span>
                    
                    {/* Holographic Avatar */}
                    <div 
                      onMouseEnter={() => { playUiSound('tap'); setIsAvatarHovered(true); }}
                      onMouseLeave={() => setIsAvatarHovered(false)}
                      className="relative w-24 h-24 mx-auto mb-4 flex items-center justify-center cursor-crosshair"
                    >
                      {isSpeaking && (
                        <>
                          <div className="voice-wave-ring w-[140%] h-[140%] [animation-delay:0s]" />
                          <div className="voice-wave-ring w-[120%] h-[120%] [animation-delay:1.5s]" />
                          <div className="voice-wave-ring w-[100%] h-[100%] [animation-delay:3s]" />
                        </>
                      )}
                      <div className="absolute inset-0 border border-dashed border-[#9D00FF]/20 rounded-full animate-orbital-spin" />
                      <div className="absolute inset-1.5 border border-dashed border-[#00D2FF]/30 rounded-full animate-orbital-spin-reverse" />
                      
                      <div className="w-20 h-20 rounded-full bg-black/60 flex items-center justify-center relative overflow-hidden border border-[#00D2FF]/40 shadow-[0_0_15px_rgba(0,210,255,0.15)]">
                        <div className="absolute top-0 left-0 w-full h-1 bg-[#00F0FF]/30 blur-xs animate-hologram-scan" />
                        <div className="w-6 h-6 rounded-lg bg-gradient-to-tr from-[#9D00FF] to-[#00D2FF] rotate-45 flex items-center justify-center animate-eye-shift shadow-[0_0_15px_rgba(0,240,255,0.6)]">
                          <div className="w-1.5 h-1.5 bg-white rounded-full animate-pulse shadow-[0_0_5px_#fff]" />
                        </div>
                        <div className="absolute inset-0 opacity-10 bg-[linear-gradient(rgba(255,255,255,0.1)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.1)_1px,transparent_1px)] bg-[size:10px_10px]" />
                      </div>
                      <div className="absolute -bottom-1 w-24 h-2.5 bg-[#00D2FF]/20 rounded-full blur-xs" />
                    </div>

                    <h4 className="text-sm font-bold font-outfit text-white">Coach Nova</h4>
                    <p className="text-[9px] text-gray-500 font-semibold tracking-wide mt-0.5">CSCS Strength & Hypertrophy Coach</p>
                    
                    <div className="flex justify-center gap-1.5 mt-2.5">
                      <div className="text-[8px] font-bold tracking-wider px-1.5 py-0.5 rounded bg-[#00F0FF]/10 border border-[#00F0FF]/20 text-[#00F0FF]">
                        NSCA-CSCS
                      </div>
                      <div className="text-[8px] font-bold tracking-wider px-1.5 py-0.5 rounded bg-[#9D00FF]/10 border border-[#9D00FF]/20 text-[#9D00FF]">
                        ISSN-SNS
                      </div>
                    </div>

                    <div className="h-px bg-white/5 my-3" />
                    
                    {/* Compact Specs Grid */}
                    <div className="grid grid-cols-2 gap-2 text-left text-[10px] font-semibold text-gray-400 font-mono">
                      <div className="bg-white/[0.01] border border-[#1F1F46]/50 p-2 rounded-xl">
                        <span className="text-[7px] text-gray-500 font-bold block uppercase tracking-wider">Experience</span>
                        <span className="text-white font-bold font-outfit">12+ Years</span>
                      </div>
                      <div className="bg-white/[0.01] border border-[#1F1F46]/50 p-2 rounded-xl">
                        <span className="text-[7px] text-gray-500 font-bold block uppercase tracking-wider">Protocol</span>
                        <span className="text-[#00F0FF] font-bold font-outfit">Hypertrophy</span>
                      </div>
                      <div className="bg-white/[0.01] border border-[#1F1F46]/50 p-2 rounded-xl col-span-2 flex justify-between items-center">
                        <div>
                          <span className="text-[7px] text-gray-500 font-bold block uppercase tracking-wider">Success Rate</span>
                          <span className="text-white font-bold font-outfit">99.4% Goal Met</span>
                        </div>
                        <i className="lucide-trending-up text-emerald-500 w-3.5 h-3.5 mr-1"></i>
                      </div>
                    </div>
                  </div>

                  {/* Compact Status Beacon */}
                  <div className="z-10 mt-auto">
                    <div className="bg-gradient-to-br from-black/40 to-black/20 border border-[#1F1F46]/50 p-3 rounded-xl flex items-center justify-between">
                      <span className="text-[8px] text-gray-500 font-bold uppercase tracking-widest font-mono">STATUS</span>
                      <div className="flex items-center gap-1.5">
                        <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse" />
                        <span className="text-[9px] font-bold text-gray-300 font-outfit uppercase tracking-wide">
                          {isSpeaking ? 'Speaking' : isTyping ? 'Thinking' : 'Online'}
                        </span>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Column 2: Chat (6 cols) */}
                <div className="col-span-1 lg:col-span-6 h-full min-h-0 flex flex-col justify-between glass-panel rounded-3xl glow-border card-radial-blue border-[#1F1F46]/50 shadow-2xl relative">
                  
                  {/* Chat Panel Header */}
                  <div className="p-3 sm:p-4 border-b border-[#1F1F46]/50 flex flex-col sm:flex-row sm:items-center justify-between gap-3 bg-black/30">
                    <div className="flex items-center gap-3">
                      {/* Desktop Header */}
                      <div className="hidden lg:flex items-center gap-3">
                        <div className="w-10 h-10 rounded-full bg-gradient-to-r from-[#00D2FF] to-[#9D00FF] p-0.5 flex items-center justify-center relative overflow-hidden shrink-0">
                          <div className="w-full h-full rounded-full bg-[#0B0B0B] flex items-center justify-center">
                            <i className="lucide-bot text-[#00F0FF] animate-pulse w-4.5 h-4.5"></i>
                          </div>
                        </div>
                        <div>
                          <h4 className="text-sm font-bold text-white font-outfit flex items-center gap-1.5">
                            Coach Nova <span className="w-1.5 h-1.5 rounded-full bg-[#00F0FF] animate-ping" />
                          </h4>
                          <div className="flex items-center gap-2 mt-0.5">
                            <span className="text-[10px] text-gray-500 font-semibold uppercase tracking-wider block">CSCS Advisor Active</span>
                            <Soundwave isSpeaking={isSpeaking} isTyping={isTyping} />
                          </div>
                        </div>
                      </div>

                      {/* Mobile/Tablet Tab Switcher */}
                      <div className="lg:hidden flex bg-white/5 p-1 rounded-xl border border-[#1F1F46]/50">
                        {[
                          { id: 'chat', label: 'Chat' },
                          { id: 'telemetry', label: 'Telemetry' },
                          { id: 'profile', label: 'Coach' }
                        ].map((tab) => (
                          <button
                            key={tab.id}
                            type="button"
                            onClick={() => { playBeep(900, 'sine', 0.05); setMobileTab(tab.id); }}
                            className={`px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-all cursor-pointer ${
                              mobileTab === tab.id 
                                ? 'bg-gradient-to-r from-[#00D2FF] to-[#9D00FF] text-white shadow-md' 
                                : 'text-gray-400 hover:text-white'
                            }`}
                          >
                            {tab.label}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div className="flex items-center justify-between sm:justify-end gap-3">
                      {/* Mobile Active Status */}
                      <div className="lg:hidden flex items-center gap-2">
                        <span className={`w-1.5 h-1.5 rounded-full bg-emerald-500 ${isSpeaking || isTyping ? 'animate-ping' : 'animate-pulse'}`} />
                        <span className="text-[9px] font-bold text-gray-400 uppercase tracking-wider">
                          {isSpeaking ? 'Speaking...' : isTyping ? 'Thinking...' : 'Active'}
                        </span>
                      </div>

                      <div className="flex items-center gap-2">
                        <button
                          type="button"
                          onClick={handleSpeechToggle}
                          className={`p-2 rounded-full border transition-all cursor-pointer flex items-center justify-center ${
                            isSpeechEnabled 
                              ? 'bg-[#00F0FF]/15 border-[#00F0FF]/40 text-[#00F0FF] shadow-[0_0_10px_rgba(0,240,255,0.2)]' 
                              : 'bg-white/5 border-[#1F1F46]/70 text-gray-400 hover:text-white'
                          }`}
                          title={isSpeechEnabled ? "Speech guidance on" : "Speech guidance muted"}
                        >
                          {isSpeechEnabled ? <i className="lucide-volume-2 w-3.5 h-3.5"></i> : <i className="lucide-volume-x w-3.5 h-3.5"></i>}
                        </button>

                        {profile.calculations && (
                          <button
                            type="button"
                            onClick={resetDiagnostic}
                            className="flex items-center gap-1 text-[9px] font-bold text-[#00F0FF] hover:text-white bg-[#00F0FF]/10 hover:bg-[#00F0FF]/20 border border-[#00F0FF]/30 px-3 py-1.5 rounded-full transition-all cursor-pointer font-outfit"
                          >
                            <i className="lucide-refresh-cw w-2.5 h-2.5"></i> <span className="hidden sm:inline">Recalibrate</span>
                          </button>
                        )}
                      </div>
                    </div>
                  </div>

                  {/* Body Content 1: Message Feed */}
                  {(mobileTab === 'chat' || window.innerWidth >= 1024) && (
                    <div ref={messagesEndRef} className="flex-1 overflow-y-auto p-4 sm:p-6 flex flex-col gap-4">
                      {messages.map((msg) => {
                        const isBot = msg.sender === 'bot';
                        return (
                          <div key={msg.id} className={`flex flex-col gap-1.5 max-w-[85%] animate-bubble-appear ${isBot ? 'self-start' : 'self-end items-end'}`}>
                            <div className={`flex gap-2.5 ${isBot ? '' : 'flex-row-reverse'}`}>
                              <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 border border-[#1F1F46]/50 ${isBot ? 'bg-[#9D00FF]/15 text-[#9D00FF]' : 'bg-white/5 text-[#00D2FF]'}`}>
                                {isBot ? <i className="lucide-bot w-3.5 h-3.5"></i> : <i className="lucide-user w-3.5 h-3.5"></i>}
                              </div>

                              <div className={`p-4 rounded-2xl text-sm leading-relaxed relative ${
                                isBot 
                                  ? 'bg-[#121212]/80 border border-[#1F1F46]/50 text-gray-200 hover:border-[#00D2FF]/20 transition-all' 
                                  : 'bg-gradient-to-r from-[#00D2FF] to-[#9D00FF] text-white shadow-[0_0_15px_rgba(0,210,255,0.12)]'
                              }`}>
                                <div className="whitespace-pre-line font-medium font-sans">
                                  {isBot ? (
                                    <TypewriterText 
                                      text={msg.text} 
                                      scrollRef={messagesEndRef}
                                      isAlreadyTyped={typedMessageIds.includes(msg.id)}
                                      onComplete={() => {
                                        if (!typedMessageIds.includes(msg.id)) {
                                          setTypedMessageIds(prev => [...prev, msg.id]);
                                        }
                                      }}
                                    />
                                  ) : (
                                    msg.text
                                  )}
                                </div>

                                {isBot && msg.visualType === 'workout' && (
                                  <InteractiveWorkoutCard profile={profile} />
                                )}
                                {isBot && msg.visualType === 'diet' && (
                                  <InteractiveDietCard profile={profile} />
                                )}
                                {isBot && msg.visualType === 'roadmap' && (
                                  <InteractiveRoadmapCard profile={profile} />
                                )}
                                
                                <div className="flex items-center justify-between gap-4 mt-2">
                                  {isBot ? (
                                    <button
                                      type="button"
                                      onClick={() => speakMessageManually(msg.text)}
                                      className="text-gray-500 hover:text-[#00F0FF] p-0.5 rounded cursor-pointer transition-colors"
                                      title="Listen to this block"
                                    >
                                      <i className="lucide-volume-2 w-2.5 h-2.5"></i>
                                    </button>
                                  ) : <div />}
                                  <span className={`text-[8px] font-semibold block text-right ${isBot ? 'text-gray-500' : 'text-white/60'}`}>
                                    {msg.time}
                                  </span>
                                </div>
                              </div>
                            </div>

                            {isBot && msg.options && onboardingStep !== null && messages[messages.length - 1].id === msg.id && (
                              <div className="flex flex-wrap gap-2 mt-1.5 ml-10">
                                {msg.options.map((opt, i) => (
                                  <button
                                    key={i}
                                    type="button"
                                    onClick={() => handleSendMessage(opt)}
                                    className="glass-panel text-[10px] sm:text-xs font-semibold text-gray-300 hover:text-white border border-[#1F1F46]/50 hover:border-[#00D2FF]/40 hover:bg-[#00D2FF]/10 px-2.5 py-1.5 sm:px-4 sm:py-2.5 rounded-xl transition-all cursor-pointer shadow-sm hover:shadow-[0_0_10px_rgba(0,210,255,0.1)]"
                                  >
                                    {opt}
                                  </button>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}

                      {isTyping && (
                        <div className="flex gap-3 self-start max-w-[85%] animate-pulse">
                          <div className="w-8 h-8 rounded-full bg-[#9D00FF]/15 text-[#9D00FF] flex items-center justify-center border border-[#1F1F46]/50">
                            <i className="lucide-bot w-3.5 h-3.5"></i>
                          </div>
                          <div className="p-4 rounded-2xl bg-[#121212]/80 border border-[#1F1F46]/50 flex flex-col gap-1.5">
                            <span className="text-[9px] text-[#00F0FF] font-bold uppercase tracking-widest font-outfit animate-pulse">
                              {thinkingStatus}
                            </span>
                            <div className="flex items-center gap-1.5">
                              <span className="w-1.5 h-1.5 bg-[#00F0FF] rounded-full animate-bounce" />
                              <span className="w-1.5 h-1.5 bg-[#00F0FF] rounded-full animate-bounce [animation-delay:0.2s]" />
                              <span className="w-1.5 h-1.5 bg-[#00F0FF] rounded-full animate-bounce [animation-delay:0.4s]" />
                            </div>
                          </div>
                        </div>
                      )}
                      
                      <div />
                    </div>
                  )}

                  {mobileTab === 'telemetry' && (
                    <div className="flex-1 overflow-y-auto p-5 sm:p-6 flex flex-col gap-4 bg-[#0E0E0E]/50">
                      <div>
                        <span className="text-[8px] text-[#9D00FF] font-bold uppercase tracking-widest border border-[#9D00FF]/30 px-2 py-0.5 rounded bg-[#9D00FF]/5 font-outfit inline-block mb-3">
                          METABOLICS
                        </span>
                        <h4 className="text-xs font-bold text-white uppercase tracking-wider font-outfit mb-3 flex items-center gap-1.5">
                          <i className="lucide-activity text-[#00F0FF] w-3.5 h-3.5"></i> Vitals Telemetry
                        </h4>
                        
                        <div className="grid grid-cols-2 gap-2">
                          {[
                            { label: 'Active Goal', value: profile.goal === 'bulk' ? 'Muscle Gain' : profile.goal === 'shred' ? 'Fat Loss' : profile.goal === 'recomp' ? 'Body Recomp' : (profile.goal || 'PENDING') },
                            { label: 'Diet Matrix', value: profile.diet || 'PENDING' },
                            { label: 'Stature Height', value: profile.height ? `${profile.height} cm` : 'PENDING' },
                            { label: 'Active Weight', value: profile.weight ? `${profile.weight} kg` : 'PENDING' }
                          ].map((item, idx) => (
                            <div key={idx} className="bg-white/[0.01] border border-[#1F1F46]/50 p-2 rounded-xl flex flex-col justify-between min-h-[42px] hover:border-[#00F0FF]/20 transition-all duration-300 font-mono">
                              <span className="text-[7px] text-gray-500 font-bold uppercase tracking-wider">{item.label}</span>
                              <span className={`text-[9px] font-bold font-outfit mt-0.5 truncate ${item.value === 'PENDING' ? 'text-amber-500/60 animate-pulse' : 'text-[#00F0FF]'}`}>
                                {item.value}
                              </span>
                            </div>
                          ))}
                        </div>
                      </div>

                      <div className="bg-gradient-to-br from-black/40 to-[#121215]/20 border border-[#1F1F46]/50 p-3 rounded-2xl mt-auto">
                        <span className="text-[8px] text-gray-500 font-bold uppercase tracking-widest font-mono block mb-2">METABOLIC PROFILE</span>
                        {profile.calculations ? (
                          <div className="flex flex-col gap-2.5 text-[9px] font-mono leading-normal text-gray-300">
                            
                            <div className="flex justify-between items-center pb-1.5 border-b border-[#1F1F46]/50">
                              <span className="text-gray-500">Basal Metabolic (BMR)</span>
                              <span className="text-white font-bold font-outfit text-[10px]">{profile.calculations.bmr} kcal</span>
                            </div>

                            <div className="flex justify-between items-center pb-1.5 border-b border-[#1F1F46]/50">
                              <span className="text-gray-500">Total Expenditure (TDEE)</span>
                              <span className="text-white font-bold font-outfit text-[10px]">{profile.calculations.tdee} kcal</span>
                            </div>

                            <div className="flex justify-between items-center pb-1.5 border-b border-[#1F1F46]/50">
                              <span className="text-gray-500">Calorie Target</span>
                              <span className="text-[#00F0FF] font-bold font-outfit text-[10px]">{profile.calculations.targetCalories} kcal</span>
                            </div>

                            <div className="flex items-center justify-between mt-1">
                              <span className="text-gray-500">Macros</span>
                              <div className="flex gap-1.5">
                                <span className="bg-[#9D00FF]/15 border border-[#9D00FF]/30 px-1.5 py-0.5 rounded text-[8px] text-[#9D00FF] font-bold">P: {profile.calculations.targetProtein}g</span>
                                <span className="bg-white/5 border border-[#1F1F46]/70 px-1.5 py-0.5 rounded text-[8px] text-white font-bold">C: {profile.calculations.targetCarbs}g</span>
                                <span className="bg-white/5 border border-[#1F1F46]/70 px-1.5 py-0.5 rounded text-[8px] text-white font-bold">F: {profile.calculations.targetFats}g</span>
                              </div>
                            </div>

                          </div>
                        ) : (
                          <span className="text-[9px] text-gray-500 font-bold block italic text-center py-2 font-mono">
                            Awaiting telemetry vectors...
                          </span>
                        )}
                      </div>
                    </div>
                  )}

                  {mobileTab === 'profile' && (
                    <div className="flex-1 overflow-y-auto p-5 sm:p-6 flex flex-col justify-start gap-4 bg-[#0E0E0E]/50 relative">
                      <div className="absolute inset-0 bg-gradient-to-b from-transparent via-[#00F0FF]/5 to-transparent h-[200%] w-full pointer-events-none animate-hologram-scan" />
                      
                      <div className="z-10 text-center">
                        <span className="text-[8px] text-[#00F0FF] font-bold uppercase tracking-widest border border-[#00F0FF]/30 px-2 py-0.5 rounded bg-[#00F0FF]/5 font-outfit inline-block mb-3">
                          AI INTEL NODE
                        </span>
                        
                        <div className="relative w-20 h-20 mx-auto mb-4 flex items-center justify-center">
                          <div className="absolute inset-0 border border-dashed border-[#9D00FF]/20 rounded-full animate-orbital-spin" />
                          <div className="absolute inset-1.5 border border-dashed border-[#00D2FF]/30 rounded-full animate-orbital-spin-reverse" />
                          
                          <div className="w-16 h-16 rounded-full bg-black/60 flex items-center justify-center relative overflow-hidden border border-[#00D2FF]/40 shadow-[0_0_15px_rgba(0,210,255,0.15)]">
                            <div className="absolute top-0 left-0 w-full h-1 bg-[#00F0FF]/30 blur-xs animate-hologram-scan" />
                            <div className="w-6 h-6 rounded-lg bg-gradient-to-tr from-[#9D00FF] to-[#00D2FF] rotate-45 flex items-center justify-center animate-eye-shift shadow-[0_0_15px_rgba(0,240,255,0.6)]">
